site_name: Portfolio

nav:
  - Главная: index.md
  - Обо мне: about.md
  - Проекты: projects.md
  - Лабораторные работы:
      - Лабораторная 1: labs/lab1.md
      - Лабораторная 2: labs/lab2.md
      - Лабораторная 4: labs/lab4.md
      - Лабораторная 5: labs/lab5.md
  - Контакты: contacts.md

theme:
  name: material
  features:
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему

markdown_extensions:
  - attr_list

extra_css:
  - stylesheets/extra.css

