name: Deploy MkDocs Site

on:
  push:
    branches:
      - main
      - release

permissions:
  contents: write  # ⚠️ КРИТИЧНО ВАЖНО - без этого не запушит в gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy docs
        uses: mhausenblas/mkdocs-deploy-gh-pages@v1.26  # ✅ Фиксированная версия вместо @master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIREMENTS: requirements.txt
          CONFIG_FILE: ./source/mkdocs.yml
          EXTRA_PACKAGES: build-base
          # TARGET_BRANCH: gh-pages  # ← gh-pages уже по умолчанию, можно не указывать

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
